name: Update lunches and deploy Pages
run-name: Update lunches (${{ github.event_name == 'schedule' && github.event.schedule || 'manual' }})

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC.
    #
    # Goal:
    # - lunch data should be updated on the site by 08:00 Europe/Helsinki
    # - run once more around 10:00 Europe/Helsinki as a safety refresh
    #
    # Helsinki time:
    # - winter: 04:12, 05:12, 06:12, 07:12, 08:12, 09:12, 10:12
    # - summer: 05:12, 06:12, 07:12, 08:12, 09:12, 10:12
    #
    # Multiple early runs make the update resilient to delayed/dropped GitHub
    # scheduled runs. The 10-ish run refreshes data once more if source pages
    # publish their menus later in the morning.
    - cron: '12 2 * * 1-5'
    - cron: '12 3 * * 1-5'
    - cron: '12 4 * * 1-5'
    - cron: '12 5 * * 1-5'
    - cron: '12 6 * * 1-5'
    - cron: '12 7 * * 1-5'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-lunches-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Europe/Helsinki
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule || 'manual' }}"
          echo "utc_now=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "helsinki_now=$(TZ=Europe/Helsinki date +'%Y-%m-%dT%H:%M:%S%z')"

      - name: Guard against late scheduled runs
        id: timing
        run: |
          helsinki_hour=$(TZ=Europe/Helsinki date +'%H')
          echo "helsinki_hour=$helsinki_hour"

          # Scheduled runs are allowed through 10:59 Europe/Helsinki.
          # Manual workflow_dispatch runs are always allowed.
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$helsinki_hour" -ge 11 ]; then
            echo "should_update=false" >> "$GITHUB_OUTPUT"
            echo "Skipping scheduled lunch update after 11:00 Europe/Helsinki."
          else
            echo "should_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.timing.outputs.should_update == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.timing.outputs.should_update == 'true'
        run: npm install

      - name: Install Playwright browser
        if: steps.timing.outputs.should_update == 'true'
        run: npx playwright install --with-deps chromium

      - name: Update lunch data
        if: steps.timing.outputs.should_update == 'true'
        run: npm run update:lunches

      - name: Commit updated lunch data
        if: steps.timing.outputs.should_update == 'true'
        run: |
          if git diff --quiet -- lunch-data.json; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add lunch-data.json
            git commit -m "Update lunch data"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
