name: Update lunches

on:
  workflow_dispatch:
  schedule:
    - cron: '5 4 * * 1-5'
    - cron: '5 5 * * 1-5'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Update lunch data
        run: npm run update:lunches

      - name: Commit updated lunch data
        run: |
          if git diff --quiet -- lunch-data.json; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lunch-data.json
          git commit -m "Update lunch data"
          git push
